<div class="dashboard-container" id="main-dashboard">
  <header>
    <div class="header-title">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2">
        <path d="M12 2v20M2 12h20M7 7l10 10M17 7L7 17"></path>
      </svg>
      <h1>WTP Flow Visualization System</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" (click)="exportReport()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"></path>
        </svg>
        Generate PDF Report
      </button>
    </div>
  </header>

  <!-- Left Side: Control Panel -->
  <app-control-panel></app-control-panel>

  <!-- Center: Flow Diagram -->
  <main class="main-content">
    <app-flow-diagram></app-flow-diagram>
  </main>

  <!-- Right Side: Results Panel -->
  <app-results-panel></app-results-panel>
</div>
